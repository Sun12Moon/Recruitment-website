<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechRecruit | Manage Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .job-card { border: none; border-radius: 15px; transition: 0.3s; }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .tech-badge { background: #e0e7ff; color: #4338ca; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; margin: 2px; display: inline-block; }
    </style>
</head>
<body>

<header class="bg-white border-bottom sticky-top py-3">
    <nav class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold fs-4 text-dark" href="index.html">Tech<span class="text-primary">Recruit</span></a>
        <div class="nav-links">
            <a href="index.html" class="text-decoration-none text-secondary me-3">Home</a>
            <a href="jobs.html" class="text-decoration-none text-primary fw-bold">Jobs</a>
            <a href="contact.html" class="btn btn-primary btn-sm ms-3">Post a Job</a>
        </div>
    </nav>
</header>

<main class="container py-5">
    <h2 class="fw-bold mb-4">Explore & Manage Jobs</h2>
    <div class="row g-4" id="jobsGrid">
        </div>
</main>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Job Opening</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3"><label class="form-label">Title</label><input type="text" id="editTitle" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Company</label><input type="text" id="editCompany" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Location</label><input type="text" id="editLocation" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Salary</label><input type="text" id="editSalary" class="form-control"></div>
                <div class="mb-3"><label class="form-label">Tags</label><input type="text" id="editTags" class="form-control"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="saveUpdate()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'http://localhost:8080/api/jobs';
    let editModal;

    document.addEventListener('DOMContentLoaded', () => {
        editModal = new bootstrap.Modal(document.getElementById('editModal'));
        fetchJobs();
    });

    async function fetchJobs() {
        const response = await fetch(API_URL);
        const data = await response.json();
        const grid = document.getElementById('jobsGrid');
        grid.innerHTML = '';

        data.forEach(job => {
            const tags = job.tags ? job.tags.split(',').map(t => `<span class="tech-badge">${t.trim()}</span>`).join('') : '';
            grid.innerHTML += `
                <div class="col-md-4" id="card-${job.id}">
                    <div class="card h-100 shadow-sm job-card p-3">
                        <div class="card-body">
                            <h5 class="fw-bold">${job.title}</h5>
                            <p class="text-muted mb-2">${job.company}</p>
                            <p class="small mb-1">📍 ${job.location} | 💰 ${job.salaryRange}</p>
                            <div class="mb-3">${tags}</div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-primary btn-sm w-100" onclick="openEditModal(${JSON.stringify(job).replace(/"/g, '&quot;')})">Edit</button>
                                <button class="btn btn-outline-danger btn-sm w-100" onclick="deleteJob(${job.id})">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    async function deleteJob(id) {
        if (confirm('Delete this job?')) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchJobs();
        }
    }

    function openEditModal(job) {
        document.getElementById('editId').value = job.id;
        document.getElementById('editTitle').value = job.title;
        document.getElementById('editCompany').value = job.company;
        document.getElementById('editLocation').value = job.location;
        document.getElementById('editSalary').value = job.salaryRange;
        document.getElementById('editTags').value = job.tags;
        editModal.show();
    }

    async function saveUpdate() {
        const id = document.getElementById('editId').value;
        const updatedJob = {
            title: document.getElementById('editTitle').value,
            company: document.getElementById('editCompany').value,
            location: document.getElementById('editLocation').value,
            salaryRange: document.getElementById('editSalary').value,
            tags: document.getElementById('editTags').value
        };

        await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedJob)
        });

        editModal.hide();
        fetchJobs();
    }
</script>
</body>
</html>
