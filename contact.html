<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechRecruit | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="sticky-top border-bottom backdrop-blur" style="background-color: rgba(255, 255, 255, 0.95);">
        <nav class="navbar navbar-expand-md navbar-light py-3 container">
            <a href="index.html" class="navbar-brand fw-bolder fs-4" style="color: #0F172A;">Tech<span class="text-primary">Recruit</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto gap-md-4">
                    <li class="nav-item"><a href="index.html" class="nav-link fw-medium text-secondary">Home</a></li>
                    <li class="nav-item"><a href="jobs.html" class="nav-link fw-medium text-secondary">Find Jobs</a></li>
                    <li class="nav-item"><a href="about.html" class="nav-link fw-medium text-secondary">About</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link active text-primary fw-medium">Contact</a></li>
                </ul>
                <a href="contact.html" class="btn btn-dark fw-medium px-4 py-2">Post a Job</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="bg-white py-5 border-bottom text-center">
            <div class="container">
                <h1 class="fw-bold mb-3" style="color: #0F172A;">Get in Touch</h1>
                <p class="text-secondary lead mb-0">Apply for a job or post an opening.</p>
            </div>
        </div>

        <section class="py-5">
            <div class="container">
                <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 mx-auto bg-white" style="max-width: 600px;">
                    <form id="postJobForm">
    <div class="mb-3">
        <label class="form-label fw-bold" style="color: #0F172A;">Job Title</label>
        <input type="text" id="jobTitle" class="form-control form-control-lg bg-light" placeholder="e.g. Senior Java Developer" required>
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold" style="color: #0F172A;">Company Name</label>
        <input type="text" id="jobCompany" class="form-control form-control-lg bg-light" placeholder="e.g. TechCorp" required>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold" style="color: #0F172A;">Location</label>
            <input type="text" id="jobLocation" class="form-control form-control-lg bg-light" placeholder="e.g. Remote, or New York" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold" style="color: #0F172A;">Salary Range</label>
            <input type="text" id="jobSalary" class="form-control form-control-lg bg-light" placeholder="e.g. $100k - $120k" required>
        </div>
    </div>
    <div class="mb-4">
        <label class="form-label fw-bold" style="color: #0F172A;">Required Skills (Comma separated)</label>
        <input type="text" id="jobTags" class="form-control form-control-lg bg-light" placeholder="e.g. Java, Spring Boot, SQL" required>
    </div>
    
    <div id="formMessage" class="mb-3 fw-bold text-center"></div>
    
    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Post Job</button>
</form>


                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-secondary py-4 mt-auto">
        <div class="container text-center"><p class="mb-0 small">&copy; 2026 TechRecruit Inc.</p></div>
    </footer>
    <script>
    document.getElementById('postJobForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Stop the page from refreshing

        // 1. Gather the data from the form
        const newJob = {
            title: document.getElementById('jobTitle').value,
            company: document.getElementById('jobCompany').value,
            location: document.getElementById('jobLocation').value,
            salaryRange: document.getElementById('jobSalary').value,
            tags: document.getElementById('jobTags').value
        };

        // 2. Send the data to your Java Backend
        try {
            const response = await fetch('http://localhost:8080/api/jobs', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(newJob)
            });

            const result = await response.json();

            // 3. Show success message and clear form
            if (result.status === 'success') {
                const msgDiv = document.getElementById('formMessage');
                msgDiv.innerHTML = '<span class="text-success">Job posted successfully! Go check the Find Jobs page.</span>';
                document.getElementById('postJobForm').reset(); // Clear the form
            } else {
                document.getElementById('formMessage').innerHTML = '<span class="text-danger">Failed to post job. Check the console.</span>';
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('formMessage').innerHTML = '<span class="text-danger">Could not connect to the server.</span>';
        }
    });
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
