<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechRecruit | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Tech<span>Recruit</span></a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="jobs.html">Find Jobs</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
                <a href="contact.html" class="btn-nav">Post a Job</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <h1>Get in Touch</h1>
                <p>Apply for a job or post an opening.</p>
            </div>
        </div>

        <section>
            <div class="container">
                <div class="contact-container">
                    <form>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" class="form-control" placeholder="Jane Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-control" placeholder="jane@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Purpose</label>
                            <select class="form-control">
                                <option>Applying for a Job</option>
                                <option>Posting a Job</option>
                                <option>General Inquiry</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea class="form-control" style="height: 120px;" placeholder="How can we help?"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Submit</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container"><div class="copyright"><p>&copy; 2026 TechRecruit Inc.</p></div></div>
    </footer>
</body>
</html>
