<div class="contact-container">
    <form action="JobServlet" method="POST">
        <input type="hidden" name="action" value="insert">
        <input type="hidden" name="jobId" id="jobId">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="fullName" id="fullName" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Purpose</label>
            <select name="purpose" id="purpose" class="form-control">
                <option value="Apply">Applying for a Job</option>
                <option value="Post">Posting a Job</option>
                <option value="General">General Inquiry</option>
            </select>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" id="message" class="form-control" style="height: 120px;"></textarea>
        </div>
        <button type="submit" class="btn-primary">Submit Entry</button>
    </form>

    <hr style="margin: 40px 0;">

    <h3>Manage Entries</h3>
    <table border="1" style="width:100%; margin-top:20px; border-collapse: collapse;">
        <thead>
            <tr style="background: #f4f4f4;">
                <th>Name</th>
                <th>Purpose</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Jane Doe</td>
                <td>Posting a Job</td>
                <td>
                    <button onclick="editEntry(1, 'Jane Doe', 'jane@example.com', 'Post', 'Hello')">Edit</button>
                    <a href="JobServlet?action=delete&id=1" style="color:red;">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
