<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>TechRecruit | Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="card shadow-sm mx-auto" style="max-width: 400px; border-radius: 15px;">
            <div class="card-body p-4">
                <h3 class="fw-bold text-center mb-4">Create Account</h3>
                <form id="signupForm">
                    <div class="mb-3"><label class="form-label">Full Name</label><input type="text" id="newName" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="newEmail" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Password</label><input type="password" id="newPass" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign Up</button>
                </form>
                <p class="text-center mt-3 small">Already have an account? <a href="signin.html">Sign In</a></p>
                <div id="msg" class="text-center mt-2"></div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                fullName: document.getElementById('newName').value,
                email: document.getElementById('newEmail').value,
                password: document.getElementById('newPass').value
            };
            const resp = await fetch('http://localhost:8080/api/users/signup', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await resp.json();
            document.getElementById('msg').innerHTML = result.status === 'success' ? 
                '<span class="text-success">Success! Redirecting...</span>' : `<span class="text-danger">${result.message}</span>`;
            if(result.status === 'success') setTimeout(() => window.location.href = 'signin.html', 2000);
        });
    </script>
</body>
</html>
