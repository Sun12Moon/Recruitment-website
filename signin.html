<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>TechRecruit | Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="card shadow-sm mx-auto" style="max-width: 400px; border-radius: 15px;">
            <div class="card-body p-4">
                <h3 class="fw-bold text-center mb-4">Sign In</h3>
                <form id="signinForm">
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Password</label><input type="password" id="pass" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
                </form>
                <p class="text-center mt-3 small">New here? <a href="signup.html">Create Account</a></p>
                <div id="msg" class="text-center mt-2"></div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = { email: document.getElementById('email').value, password: document.getElementById('pass').value };
            const resp = await fetch('http://localhost:8080/api/users/signin', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await resp.json();
            if(result.status === 'success') {
                localStorage.setItem('userName', result.user);
                window.location.href = 'index.html';
            } else {
                document.getElementById('msg').innerHTML = `<span class="text-danger">${result.message}</span>`;
            }
        });
    </script>
</body>
</html>
